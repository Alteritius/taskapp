{% extends 'base/main.html' %}
{% block content %}

<div class="header-bar">
    <div>
        <h1>Calendar</h1>
        <!-- <h3 style="margin:0"> You have <i>{{count}}</i> incomplete task{{ count|pluralize:"s" }}</h3> -->
    </div>
    <a href="{% url 'tasks' %}">TaskList</a>

    {% if request.user.is_authenticated %}
    <a href="{% url 'logout' %}">Logout</a>
    {% else %}
    <a href="{% url 'login' %}">Login</a>
    {% endif %}
    
</div>

<div>
    <br>
    <a class="calendar_button" href="{% url 'calendar' %}?{{ prev_month }}"> Previous Month </a>
    <a class="calendar_button" href="{% url 'calendar' %}?{{ next_month }}"> Next Month </a>
    <br>
    <br>
    <br>

    <div>
        {{ calendar }}
    </div>

</div>
