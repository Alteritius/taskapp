<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Task App</title>
    <meta name='descritpion' content=''>
    <meta name='viewport' content='width=device-width, initial-scale=1'>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200&display=swap" rel="stylesheet">


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">



    <style>

        :root {
            --background_color_1: #F8F8FF; /*#FAFAFA */
            --background_color_2: #fff;
            --page_color_1: #4169E1; /* #EEA390, #4169E1 */
            --page_color_2: #1E90FF; /* #191970  #EB796F* #1E90FF */
            --page_color_3: ;
            --header_bar_hover_color: #4a5259;
            --delete_link_color: #cf4949;
            --hover_color: #4a5259;
            --hover_text_color: #F8F8FF;

        }

        body{
            background-color: var(--background_color_1);
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            padding-top: 50px;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
                font-family: 'Roboto', sans-serif;
                font-weight: 500;
        }    

        a,
        p {
            color: #4b5156;
        }


        .container{
            max-width: 550px;
            margin: auto;
            background-color: var(--background_color_2);
            -webkit-box-shadow: 2px 2px 13px -4px rgba(0, 0, 0, 0.21);
            box-shadow: 2px 2px 13px -4px rgba(0, 0, 0, 0.21);
        }

        .sidebar {
            height: 100%;
            width: 150px;
            position: fixed;
            z-index: 1;
            top: 0;
            left: 0;
            background: var(--page_color_2);
            overflow-x: hidden;
            padding-top: 20px;
        }

        .sidebar a {
            padding: 6px 8px 6px 16px;
            text-decoration: none;
            font-size: 25px;
            display: block;
            color: var(--background_color_1)
        }

        .sidebar a:hover {
            color: var(--header_bar_hover_color)
        }

        .header-bar{
            display: flex; 
            justify-content: space-between;
            color: var(--background_color_2);
            padding: 10px;
            border-radius: 5px 5px 0 0;
            background: linear-gradient(90deg, var(--page_color_1) 0%, var(--page_color_2) 37%, var(--page_color_2) 88%);
        }

        .header-bar a{
            color: rgb(247, 247, 247);
            text-decoration: none;
            padding: 5px;
            display: inline;
        }

        .header-bar a:hover {
            color: var(--header_bar_hover_color);
        }


        .task-wrapper {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background-color: var(--background_color_2);
            border-top: 1px solid rgb(226, 226, 226);
        }

        .task-title {
            flex: 1 1;
            
            overflow: hidden;
            text-overflow: ellipsis;

        }

        .task-title a {

            text-decoration: none;
            color: #4b5156;
            margin-left: 25px;
        }

        .task-complete-icon {
            height: 20px;
            width: 20px;
            background-color: rgb(105,192,105);
            border-radius: 50%;
        }

        .task-incomplete-icon {
            height: 20px;
            width: 20px;
            background-color: rgb(218,218,218);
            border-radius: 50%;
        }

        .delete-link {
            text-decoration: none;
            font-weight: 900;
            color: var(--delete_link_color);
            font-size: 22px;
            line-height: 0;
        }
        

        #search-add-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
        }

        #add-link {
            color: var(--page_color_2);
            text-decoration: none;
            font-size: 42px;
            text-shadow: 1px 1px #81413b;
        }

        input[type=text],
        input[type=password],
        textarea {
            border: 1px solid var(--page_color_2);
            border-radius: 5px;
            padding: 10px;
            width: 90%;
        }

        label {
            padding-top: 10px !important;
            display: block;
        }

        .button {
            border: 1px solid var(--page_color_2);
            background-color: var(--background_color_1);
            color: var(--page_color_2);
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none; 
            transition-duration: 0.4s;
        }

        .button:hover {
            background-color: var(--hover_color);
            color: var(--background_color_1);
        }

        .calendar_button{
            border: 1px solid var(--page_color_2);
            background-color: #FAFAFA;
            color: var(--page_color_2);
            padding: 10px;
            font-size: 14px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none; 
            margin-bottom: 10px;
            transition-duration: 0.4s;
        }

        .calendar_button:hover {
            background-color: var(--hover_color);
            color: var(--background_color_1);
        }

        .calendar {
            margin: auto;
            vertical-align: middle;
            border-spacing: 5px;
            
        }

        #today {
            background-color: var(--page_color_2);
            color: #FAFAFA;
            
        }

        #today a {
            color: #FAFAFA;
        }

        .date a {
            text-decoration: none;
        }

        .card-body {
            padding: 20px;
        }

        .card-body-delete {
            padding: 20px;
            
        }

        .card-body-delete p {
            overflow: hidden;
            text-overflow: ellipsis;
        }
        table {
            border-collapse: separate;
        }

        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        td, th {
        	width: 40px;
        	height: 40px;
        	text-align: center;
        	vertical-align: middle;
        	color: #444;
        	position: relative;
        }
        th {
        	height: 20px;
        	font-weight: bold;
        	font-size: 14px;
        }

    </style>
</head>
<body>

    <div class="container">
        {% block content %}

    </div>
    
</body>
</html>
